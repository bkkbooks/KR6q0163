body:
  text: 普明寺牧牛圖頌序咄盡大地是普明一頭牛何處更有佛與衆生毫厘不隔本是如如若道此牛有黑有白有雄有雌有饑有飽便是一體分別成二世尊初生指天指地周行目顧犯人苗稼不少祖師西來直指人心見性成佛喫他水草良多三玄要四料揀五位君臣九十六圓相受盡牽制鞭策乃至拈椎豎拂行棒行喝種種機用皮毛脫落四足潛蹤許大一頭牛不知逃向那裡去了到這裡地重關已破且道向上還有事麼以拂子打圓相云火裡木牛耕白雪雲中石馬舞春風會麼不會請看牧牛頌并諸方次韻語句畢竟還有優劣也無臨濟正宗三十二世𨍏轢道人嚴大參謹序普明禪師牧牛圖頌附諸大禪師和頌目録普明原頌雲棲蓮太師付梓序云普明未詳何許人則亦不知道場之所矣辛丑冬豫來理坊事壬寅夏𨍏轢嚴居士將普明緣起及舊寺圖相示始知因緣在此居士既恢復寺基初請玄微禪師繼請明巖耆德殿宇煥然僚房俱備將來欲成獅窟余見諸方和頌讀之不勝喜躍效顰和之并將圖頌和頌合成一冊流通聞谷大師天隱禪師破山禪師萬如禪師浮石禪師玉林禪師箬菴禪師山茨禪師玄微禪師香幢法主𨍏轢居士跛道人如念無依道人康熙元年孟秋月日寓般若堂如念空識未牧普明禪師頌未牧第一生獰頭角恣咆哮奔走溪山路轉遙一片黑雲橫谷口誰知步步犯佳苗初調普明禪師頌初調第二我有芒繩驀鼻穿一回奔競痛加鞭從來劣性難調制猶得山童盡力牽受制普明禪師頌受制第三漸調漸伏息奔馳渡水穿雲步步隨手把芒繩無少緩牧童終日自忘疲回首普明禪師頌回首第四日久功深始轉頭顛狂心力漸調柔山童未肯全相許猶把芒繩且繫留馴伏普明禪師頌馴伏第五緑楊陰下古溪邊放去收來得自然日暮碧雲芳草地牧童歸去不須牽無礙普明禪師頌無礙第六露地安眠意自如不勞鞭策永無拘山童穩坐青松下一曲升平樂有餘任運普明禪師頌任運第七柳岸春波夕照中淡煙芳草緑茸茸饑餐渴飲隨時過石上山童睡正濃相忘普明禪師頌相忘第八白牛常在白雲中人自無心牛亦同月透白雲雲影白白雲明月任西東獨照普明禪師頌獨照第九牛兒無處牧童間一片孤雲碧嶂間拍手高歌明月下歸來猶有一重關雙泯普明禪師頌雙泯第十人牛不見杳無蹤明月光寒萬象空若問其中端的意野花芳草自叢叢寒或作含真寂和尚和牧牛圖頌師諱廣印號聞谷未牧信足奔馳不憚勞東西南北路迢遙只貪芻草平田闊忘卻家鄉有異苗初調氣性雖頑鼻已穿牧童從此痛加鞭渾身血汗芒繩急遙望家山儘力牽受制暫時出草息奔馳好把芒鞋緊自隨到處凍雲霜露滑斤斤調伏敢忘疲回首芒繩不引自回頭毛色皤然性已柔水草也知山裏足牧童多意尚羈留馴伏暖風晴日柳溪邊俯首循人意悄然花落郊原春色晚相隨歸去不須牽無礙調伏多年意自如水邊林下總無拘一聲羌笛松風起此日忘懷樂有餘任運百花溪上柳陰中飽食和雲臥緑茸歌罷山童無所事遺鞭枕上睡方濃相忘在在溪山雲月中木人花鳥意相同國王水草從來足閒步陂塘西復東獨照玉鞭無用草繩閒蹤跡全無古路間空手獨歸林月下更前一步即牢關雙泯杳杳人牛不見蹤一團新月照秋空個中若問還源旨風落岩花點翠叢真寂和報恩和尚和牧牛圖頌師諱圓修號天隱未牧水雲渺渺亂聲哮密密尋蹤路更遙晝夜風霜不知處恐伊相犯別家苗初調才獲繩頭把鼻穿謾將痛處更加鞭也知鄉井迢迢遠拽轉頭來著力牽受制不從他性遠驅馳寸步提持漫漫隨幾度黑風吹瀑雨通身泥水總忘疲回首驀地忘機自轉頭悄然性氣已調柔山中水草了知足不用遲疑在外留馴伏開放林間與水邊橫騎短笛任悠然歸來一帶煙霞晚瀟灑歌謠不假牽無礙出入無欄心自如擬思量處更猶拘滿懷風月人牛穩鞭索俱忘樂有餘任運野岸溪灣花柳中一環山水翠林茸逍遙快活無求也軟草為氈睡興濃相忘拶到忘懷混沌中千山一色絶相同風光不覺人牛處任運騰騰西復東獨照不須牧放淂安閒脫略尋常顧盻間散步謾歸明月下踏翻泛上兩重關雙泯人牛處處竟無蹤新月孤懸萬象空借問歸源端的旨枯樁春到緑叢叢報恩和東塔和尚和牧牛圖頌師諱海明號破山嗣法天童未牧頭角崢嶸便吼哮奔兢煙水路迢遙牧童草料渾無戀孰肯平田犯稼苗初調牛兒鼻孔被繩穿放去收來不假鞭擬向東西兩處觸一回入草一回牽受制年深日久懶奔馳雲影溪光逐漸隨任是上林花鳥過聲二難喚牧兒疲回首計窮力極喚回頭謾把鞭繩間放柔七縱八擒縛樹下山童猶未肯停留馴伏山間林下水溪邊一飽無餘慶快然撒手童兒歸路晚和牛急向遠村牽無礙穩眠露地意如如陽焰空花何所拘松韻山童弄鐵笛輕輕吹醒樂無餘任運南北東西任運中腳頭腳底草茸茸飽餐只剩些些意留與山童瞌睡濃相忘雲牛一片白其中那有雌黃與異同就裏欲兮纖細子騰騰運運復西東獨照牧童鼓掌自閒閒始信牛蹤沒此間遂淂殷勤謾且喜猶存星月照幽關雙泯人牛頓盡絶形蹤浩浩光吞宇宙空明月蘆花來問的東風吹起自叢叢東塔和破山萬如禪師和牧牛圖頌師諱通微未牧劣性粗狂向外逃鄉關迢遞不知遙分明觸處荒田地那肯回頭惜異苗初調驀路相逢把鼻穿饒伊惡性猛加鞭從今已淂繩頭在才要奔趨只一牽受制暫息顛頑暫息馳頻頻相顧也相隨芒繩雖緩鞭尤朴不算工夫不憚疲回首頑劣消除已轉頭不加鞭逼性相柔牧童未敢憑他意還把繩頭緊繫留馴伏萬木叢中芳草邊芒繩釋去意翛然夕陽影裡歸鴉噪牛自相隨不用牽無礙皤白渾身性自如海天空闊不相拘牧童閒倚松邊石短笛頻吹興有餘任運千條溪畔萬山中餐飲隨時飽緑茸牧子從教無個事鼾鼾枕臂不知濃相忘是處雲山牛在中兩無心意月相同碧天影落溪流急任爾縱橫西復東獨照生涯喪盡一身閒明月光騰古木間歌罷一聲歸去晚芒鞋踏破隔鄉關雙泯廓然空絶兩無蹤寶月孤懸照碧空個事不須重借問子規聲斷落花叢萬如和東塔浮石禪師和牧牛圖頌師諱通賢未牧蹉過聲前這一哮反生邊見歷途遙披毛帶角渾無慮糞草何曾識稼苗初調才識牛兮鼻已穿翻然自肯苦加鞭暫時不在頻偷走猶把芒繩緊緊牽受制渡水穿雲不亂馳任從呼遣總相隨牛兒雖以堪調治未許山童暫放疲回首一回入草一回頭可比初時性已柔滿徑落花思踐履客途煙雨豈羈留馴伏玲瓏石伴古松邊任運騰騰始貼然手裡有須放下鼻中去索不須牽無礙觸處逢渠淂自如入泥入水又何拘饑餐渴飲困來睡底事從來無缺餘任運已眼撐開宇宙中胡來胡現任茸茸山童閒唱還鄉曲不覺令人歸思濃相忘喪盡偷心豁達中人牛何異復何同從今兩絶提防力可以西兮可以東獨照脫盡皮毛赤體閒堂堂獨露笑談間不是渠儂能了達祗因透徹上頭關雙泯空空寂寂杳無蹤一點靈機盡掃空智理不存悲化普一輪明月照幽叢浮石和玉林和尚和牧牛圖頌師諱通琇繼住報恩未牧牛本荷人人不識胡行亂躍隔迢遙一回摸著牛兒鼻大千沙界沒莖苗初調寄言識淂牛兒者莫學時流強策鞭我是牛兮牛是我分明無二若為牽受制牧童但不迷頭去純白牛兒到處隨非比道途販賣客橫騎倒捋自無疲回首莫道功深始轉頭牛無背面與剛柔山童但淂狂心歇鼻孔彌天絶去留馴伏尋常逐遂營營者謾道長調方帖然見徹斯牛無往返始知多載枉拘牽無礙本自翛然絶絆羈知恩豈肯強牽拘縱橫飛舞無留跡誰信那伽定有餘任運不分內外與邊中傍水尋芳入亂叢回首東山吐新月騎歸茆屋興猶濃相忘強把全軀分二體計窮力盡始知同他長我短俱休問說甚人西與物東獨照頂破虛空蹈碎地不留一物雜其間孤孤迥迥雖堪羡瞥爾知羞始透關雙泯誰為所牧誰為牧認影牽風徹底空有問其中端的意早知芻犬吠茅叢玉琳和箬庵禪師和牧牛圖頌師諱通問未牧走遍天涯逞意哮穿雲涉水路迢遙多年一片閒田地蹂踏堪憐損稼苗初調鼻孔生獰不易穿一回入草一加鞭狂心何計能拴縛賴有山童把索牽受制擬將何處更驅馳暮兩朝煙緊自隨蹤跡欲逃難躲避任渠奔烈也成疲回首翻然自肯便回頭滿地殘紅襯草柔故國有懷情未撇暗愁春老尚遲留馴伏收來放去古溪邊風月隨緣自悄然水草不思無底事相看撒手竟忘牽無礙縱步溪山得自如風流兩岸亦何拘橫吹短笛斜陽暮溢目春光信有餘任運不曾移步出山中暖簇晴花五色茸莫怪山童閒瞌睡臥雲眠月興偏濃相忘相將無事太平中渠我情忘迥不同一段閒愁總收拾不知花落水流東獨照一道寒光萬境閒寥寥四顧水雲間夜深明月歸來後照徹空王向上關雙泯從前光影覓無蹤不見人牛煙水空盡大地回春曉夢日高香散百花叢箬庵和山茨禪師和牧牛圖頌師諱通際未牧水草溪邊縱意哮鼻頭無繫去迢遙誰知宇宙皆王化亂踏雲山犯稼苗初調芒繩初把鼻相穿熟處難忘痛著鞭分付牧童牢守護莫教暫失手中牽受制動容頑性好奔馳左右旋眸渠緊隨悵望遠山鄉信杳披雲帶月正忘疲回首知恩逐步肯回頭烈氣消融性漸柔騎向平陂深草處橫吹短笛絶羈留馴伏只在平田煙柳邊鞭繩拋卻坐翛然暮山鐘動上方月恁麼歸來不假牽無礙人牛相視體如如彼此無心不用拘花柳叢中隨意往團團蹄跡更無餘任運或時村裡或雲中舊地閒田草正茸踏遍一毫無剩跡牧童高臥柳陰濃相忘撐撐頭角臥林中渠我渾忘雲水同為愛山前芻草細夜深乘月過溪東獨照個裡風光鎮日閒放身穩臥白雲間長歌一曲聲嘹喨直透威音劫外關雙泯不見人牛不見蹤清風明月滿長空太平休用歌堯令枯木重開花一叢山茨和桐月菴禪師和牧牛圖頌師諱妙用號玄微未牧黑雲低處一聲哮足底程途那信遙童子個時將貫索未嘗留意惜良苗初調鼻孔今朝始受穿十分狂性只宜鞭要渠了了尋常事不管通身黑業牽受制蹊徑於今不枉馳鞭繩緩緩肯相隨家山水草隨時給信步風流也不疲回首緑楊堤畔碧溪頭景自晴和風自柔水牯轉頭初自肯月明歸路謾遲留馴伏那裏隨來過這邊左盤右轉總安然黃鶯叫淂山花笑聲色中能不被牽無礙脫落虛空萬象如人牛浪蕩不相拘鞭繩揚下無子引興梅花一調餘任運我自悠然一覺中任渠草徑玩纖茸落花沒膝春山晚猶潑紅霞錦繡濃相忘白雲拖過月明中月與雲和一色同智境此時都不會何論南北與西東獨照家破蕭然四壁閒於今雲淨月明間固非往日程途事尚好挨身拶過關雙泯劇盡何方覓影蹤不應空裏鏤虛空有誰道露堂堂地蜂蝶癡迷花底叢桐月和一指菴禪師和牧牛圖頌師諱明海號香幢未牧東奔西觸縱狂哮越嶺盤溪不憚遙眼底只貪畦畔草那知回首有靈苗初調幾年鼻孔未經穿今日收來始著鞭捏定索頭無少緩一回入草一回牽受制頑皮且喜罷驅馳我步溪邊他亦隨只恐柳絲拴不住孜孜照管略無疲回首一自牽歸這一頭幾將鞭杖驗剛柔而今已蹈還家路懶聽枝頭黃栗留馴伏幾處低坡淺水邊相依相狎意陶然山雲欲暮歸村舍宛轉隨人不用牽無礙水草尋常事事如任渠飲啄懶相拘笛聲喚醒珊瑚月狼籍清光一點餘任運緩步春山平麓中風和日暖草蒙茸鼾齁一枕藤蘿石不管岩花色淡濃相忘通身皎潔片雲中明月蘆花未許同謾道玉樓窗已曉金烏猶在海門東獨照牛自空兮人自間翛然獨步水雲間尚須驀地翻身轉靠倒窮途最後關雙泯皮毛蓑笠了無蹤一片寒光墮碧空煙雨故園消息斷百花何處鬥芳叢一指和𨍏轢道人嚴大參和牧牛圖頌未牧雲山堆裏一聲哮頭角宛然家信遙滿地閒花都踏遍那知異草并良苗初調生獰如虎鼻難穿賴淂牧童有索鞭不是一番施辣手個時劣性恐難牽受制熟徑難忘欲逞馳芒繩在手緊相隨豈容逐草尋芳去晝夜拘拴不憚疲回首暫時落草即回頭雲凍霜寒足已柔欲緩鞭繩尤未緩鄉關不到且拘留馴伏高深蹊徑曲無邊相押相馴已信然楊柳陰斜紅日轉鼻頭繩斷不須牽無礙水草皇王總自如何須特地苦相拘山童撒手先高坐牛亦安然閒有餘任運信步行來到此中山前山後草茸茸放渠散走陂塘去不似當年狂興濃相忘太平氣象月明中爾我家山色色同袖手低眉忘管帶不知西去與來東獨照蹤跡寥寥獨個閒渾然出處那其間自歌自唱空山下多少癡人認過關雙泯人牛謾說絶形蹤何異吹風欲滿空若問還源親的旨參天荊棘亂叢叢𨍏轢和𨍏轢道人再和牧牛圖頌未牧牟牟聲響是渠哮欲覓頭蹤轉展遙狹路相逢剛識淂甘心饑餓不嘗苗初調娘生鼻孔未經穿痛處針錐痛處鞭漫道牧童施毒手恐渠馳逐倍加牽受制古路凄凄作麼馳他山岐曲肯相隨癡兒不把繩頭放牢繫虛空徒自疲回首自從蹈著這源頭骨力雖剛毛色柔日薄虞淵歸意急肯貪芻草故淹留馴伏蹄跡團團古岸邊飢餐渴飲恣悠然東來西往皆平貼出外歸家總不牽無礙嶺頭溪畔自如如豎走橫眠更不拘水草國王隨分給本來無缺亦無餘任運牛兒閒放此山中臥草眠花飽緑茸圜圚從來渠不入逍遙自在興偏濃相忘人牛共住碧岩中到處溪山雲月同猿鳥自啼花自笑水流西去岸移東獨照脫盡皮毛淂自閒翛然獨步水雲間可憐無限英靈漢開眼堂堂入死關雙泯處處逢渠沒影蹤碧天雲淨月輪空個中多少風流趣寶鴨香消錦繡叢𨍏轢再和𨍏轢道人三和牧牛圖頌未牧黎然體色驀然哮震地驚天用不遙嚼盡山花吸盡水不留常住一莖苗初調鼻孔撩天不受穿誰能下手妄加鞭牧童縱有繩頭在枉費功夫著力牽受制牛兒有腳自驅馳堪笑盲兒步步隨泥水溪深渾不染牽他入草淂毋疲回首轉腦旋蹄錯路頭何分頑劣與剛柔驀然直去家鄉到不必淹淹在外留馴伏散誕溪邊與草邊要騎要下任安然索頭盤結牛頭上到處為家不用牽無礙柳陌花街到處如犯人苗稼又何拘橫衝直撞都無礙窠臼掀翻無剩餘任運夜半歸來月正中三生石上草茸茸太平休斬癡頑漢一任橫吹鐵笛濃相忘這中黑白元來一色同我不似渠渠似我誰分南北與西東獨照牧他屎屁不曾閒鞭向無生眨眼間有意氣時添意氣何妨一鏃破三關雙泯泥牛入海杳無蹤木馬嘶風向碧空個事若何重話會花開鐵樹鬧叢叢𨍏轢三和跛道人如念牧牛圖頌有序諸佛垂跡祖師西來無非發明此事拈捶豎拂熱棒熱喝單提向上機輪普明禪師假人法重設牧牛圖頌𨍏轢居士報佛恩復興祖師道場大禪師錦上鋪花跛道人畫龍點眼長安風月貫今古那箇男兒不丈夫阿呵呵好大哥未牧頭角崢獰恣意哮溪山踏遍路迢遙牧童不把牛穿鼻難保狂心不犯苗初調繩頭在手鼻兒穿性劣難調緊著鞭從此一番休放緩牧童須是要頻牽受制劣性調柔漸息馳牽來步步已相隨牧童猶把精神抖到此渾然不覺疲回首顛狂心盡始回頭功用無間牛自柔信手牽歸明月下免從水草又停留馴伏不計山邊與水邊了然無事自安然森羅萬象渾間事從此牛兒不用牽無礙獨露堂堂意自如安眠穩坐已無拘牧童短笛間拈弄一曲橫吹樂有餘任運識破元來只此中間花野草任茸茸東西南北無遮障拍手高歌興正濃相忘白牛只在白雲中渴飲饑餐總是同間著山童石上立此間那復問西東獨照牛兒無跡地間間明月團圞只此間自有一雙窮相手一拳直透萬重關雙泯人牛俱泯杳無蹤水在長江月在空猿抱子歸青嶂裡鳥銜花落碧嵒叢無依道人和牧牛圖頌徐諱昌治號覲周未牧頭角未露一聲哮自在縱橫去路遙黑白始分牝牡相生來柔順長靈苗初調順性今朝也受穿何煩童子又加鞭線索在手隨時轉到處風光無掛牽受制踏著溪山便騁馳朝行暮宿緊相隨一回飲水一回脹悠悠負載不辭疲回首堪悲烈性不回頭幸得天生稟性柔遍界落花忘踐履煙雲霄路莫停留馴伏不分內外與中邊束縛無拘意灑然信步行來皆坦道騰騰任運總無牽無礙萬別千差性本如超群惟此性無拘一身負荷皆全力本分何曾有缺餘任運暫爾息肩臥雲中忽長新芽生意茸引重致遠隨意適箇中獨步興偏濃相忘忽忘管帶太虛中渴飲饑餐處處同物我盡捐知解淨如日西升夜落東獨照得安閒處且安閒不留轍跡在人間瞥爾英明了達去踢倒銀山鐵壁關雙泯隔墻清聽絶無蹤形影孤寒照碧空窗楞已過渾無事又何精舍竹林叢無依道人和牧公道人項真本和牧牛圖頌未牧青山緑水恣咆哮四顧三回路轉遙只管貪程為太速何知日用犯佳苗初調才見牛兮驀鼻穿粗浮習氣急加鞭那時掘強橫馳走把定繩頭好一牽受制四蹄今已息奔馳放去收來無不隨且喜鞭繩猶把握牧童何肯自為疲回首溪山踏遍自回頭熟處生時性漸柔鼻貫一條成底事不勞腕力暫相留馴伏左盤右轉碧溪邊撇下鞭繩樂自然幾度緑楊歸夜月山童高臥竟忘牽無礙掉尾擎頭適自如縱橫脫略有何拘悠然一曲寒崖上短笛吹開物外餘任運飢餐渴飲絶邊中倦即和雲臥草茸驟步任教青嶂外滿腔風月興偏濃相忘人牛共住此山中動轉施為絶異同我本是渠渠即我不知南北與西東獨照牛無方所牧童閒懶把虛名落世間盡大地來無我我不消彈指透重關雙泯人牛兩盡沒形蹤今古相酬劫亦空本地風光一段事歲寒松柏翠叢叢牧公和
